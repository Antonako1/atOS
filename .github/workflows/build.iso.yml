name: Build ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set build start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y nasm make gcc genisoimage cmake ninja-build

      - name: Build ISO
        run: make iso

      # -------------------------
      # Build timing + summary
      # -------------------------
      - name: Set build end time
        run: echo "END_TIME=$(date +%s)" >> $GITHUB_ENV
      - name: Calculate build duration
        run: |
          START_TIME=${START_TIME}
          END_TIME=${END_TIME}
          DURATION=$((END_TIME - START_TIME))
          echo "DURATION=${DURATION}" >> $GITHUB_ENV

          echo "Build started at: $(date -d @$START_TIME)"
          echo "Build finished at: $(date -d @$END_TIME)"
          echo "Total build time: ${DURATION} seconds"

      # Optional: Add nice GitHub summary
      - name: Write job summary
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          # Expected versions (from your spec)
          EXPECTED_NASM="2.16"
          EXPECTED_MAKE="4.3"
          EXPECTED_GCC="13.3.0"
          EXPECTED_GENISO="1.1.11"
          EXPECTED_CMAKE="3.28.3"
          EXPECTED_NINJA="1.11.1"

          # Actual versions
          ACTUAL_NASM=$(nasm -v)
          ACTUAL_MAKE=$(make --version | head -n1)
          ACTUAL_GCC=$(gcc --version | head -n1)
          ACTUAL_GENISO=$(genisoimage --version | head -n1)
          ACTUAL_CMAKE=$(cmake --version | head -n1)
          ACTUAL_NINJA=$(ninja --version)

          SUMMARY="summary.md"
          echo "qemu-system-x86_64 version should be 8.2.2 for running the ISO." >> $SUMMARY
          echo "" >> $SUMMARY
          echo "## Build Summary" >> $SUMMARY
          echo "- Start Time: $(date -d @$START_TIME)" >> $SUMMARY
          echo "- End Time: $(date -d @$END_TIME)" >> $SUMMARY
          echo "- Duration: ${DURATION}s" >> $SUMMARY
          echo "" >> $SUMMARY
          echo "### Tool Versions (Expected vs Actual)" >> $SUMMARY
          echo "" >> $SUMMARY
          echo "| Tool | Expected | Actual |" >> $SUMMARY
          echo "|------|----------|--------|" >> $SUMMARY
          echo "| NASM | $EXPECTED_NASM | $ACTUAL_NASM |" >> $SUMMARY
          echo "| Make | $EXPECTED_MAKE | $ACTUAL_MAKE |" >> $SUMMARY
          echo "| GCC | $EXPECTED_GCC | $ACTUAL_GCC |" >> $SUMMARY
          echo "| Genisoimage | $EXPECTED_GENISO | $ACTUAL_GENISO |" >> $SUMMARY
          echo "| CMake | $EXPECTED_CMAKE | $ACTUAL_CMAKE |" >> $SUMMARY
          echo "| Ninja | $EXPECTED_NINJA | $ACTUAL_NINJA |" >> $SUMMARY

          cat $SUMMARY >> $GITHUB_STEP_SUMMARY

      # -------------------------
      # Upload ISO as artifact
      # -------------------------
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: atOS-iso
          path: OUTPUT/ISO/atOS.iso

      # -------------------------
      # Create GitHub Release
      # -------------------------
      - name: Generate release tag
        id: tag
        run: echo "TAG=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "atOS Build ${{ steps.tag.outputs.TAG }}"
          body_path: summary.md
          files: OUTPUT/ISO/atOS.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
